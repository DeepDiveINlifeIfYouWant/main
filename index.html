<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI School Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="loginScreen" class="screen active">
            <div class="login-container">
                <h1>School AI Assistant</h1>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" required>
                    </div>
                    <div class="form-group">
                        <label for="userType">User Type:</label>
                        <select id="userType" required>
                            <option value="">Select User Type</option>
                            <option value="administrator">Administrator</option>
                            <option value="teacher">Teacher</option>
                            <option value="student">Student</option>
                            <option value="parent">Parent</option>
                            <option value="simple">Simple User</option>
                        </select>
                    </div>
                    <button type="submit">Login</button>
                </form>
            </div>
        </div>

        <!-- Main Chat Interface -->
        <div id="chatScreen" class="screen">
            <div class="chat-container">
                <header class="chat-header">
                    <h2>AI School Assistant</h2>
                    <div class="user-info">
                        <span id="currentUser"></span>
                        <button id="logoutBtn">Logout</button>
                    </div>
                </header>

                <div class="chat-messages" id="chatMessages">
                    <div class="message ai-message">
                        <div class="message-content">
                            Hello! I'm your AI school assistant. How can I help you today?
                        </div>
                    </div>
                </div>

                <div class="chat-input-container">
                    <input type="text" id="chatInput" placeholder="Type your message...">
                    <button id="sendBtn">Send</button>
                </div>
            </div>
        </div>

        <!-- Admin Training Panel -->
        <div id="adminPanel" class="screen">
            <div class="admin-container">
                <header class="admin-header">
                    <h2>AI Training Panel</h2>
                    <div class="admin-nav">
                        <button id="backToChatBtn">Back to Chat</button>
                        <button id="logoutAdminBtn">Logout</button>
                    </div>
                </header>

                <div class="training-section">
                    <h3>Train AI Responses</h3>
                    <div class="training-form">
                        <div class="form-group">
                            <label for="trainingQuestion">Question/Input:</label>
                            <textarea id="trainingQuestion" rows="3" placeholder="Enter the question or input..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="trainingResponse">Expected Response:</label>
                            <textarea id="trainingResponse" rows="4" placeholder="Enter the expected response..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="responseCategory">Category:</label>
                            <select id="responseCategory">
                                <option value="general">General</option>
                                <option value="academic">Academic</option>
                                <option value="administrative">Administrative</option>
                                <option value="schedule">Schedule</option>
                                <option value="events">Events</option>
                            </select>
                        </div>
                        <button id="trainBtn">Train AI</button>
                    </div>
                </div>

                <div class="training-data-section">
                    <h3>Training Data</h3>
                    <div id="trainingDataList" class="training-data-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="ai-engine.js"></script>
    <script src="database.js"></script>
    <script src="app.js"></script>
</body>
</html>
